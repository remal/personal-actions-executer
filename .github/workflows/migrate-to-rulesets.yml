name: Migrate to rulesets

on:
  push:
    branches:
    - main
    paths:
    - '.github/workflows/migrate-to-rulesets.yml'
  workflow_dispatch: { }

concurrency:
  group: migrate-to-rulesets
  cancel-in-progress: false

jobs:
  migrate-to-rulesets:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Migrate branch protection rules to rulesets for all public repos
      uses: actions/github-script@v8
      with:
        github-token: ${{secrets.PERSONAL_ACCESS_TOKEN}}
        script: |
          const repos = await github.paginate(github.rest.repos.listForAuthenticatedUser, {
            visibility: 'public',
          })
          for (const repo of repos) {
            if (repo.fork) continue
            if (repo.archived) continue
            if (!repo.permissions.push) continue
            await core.group("Processing " + repo.full_name, async () => {
              core.info('Fetching existing rulesets...')
              const { data: rulesetsList } = await github.rest.repos.getRepoRulesets({
                owner: repo.owner.login,
                repo: repo.name,
              })
              core.info(`Found ${rulesetsList.length} ruleset(s)`)

              for (const rulesetSummary of rulesetsList) {
                const { data: ruleset } = await github.rest.repos.getRepoRuleset({
                  owner: repo.owner.login,
                  repo: repo.name,
                  ruleset_id: rulesetSummary.id,
                })
                if (ruleset.conditions?.ref_name?.include?.includes('~DEFAULT_BRANCH')) {
                  core.info('Skipping: Ruleset for default branch already exists:')
                  core.info(JSON.stringify(ruleset, null, 2))
                  return
                }
              }

              throw new Error('Testing')

              core.info('Fetching branch protection rules...')
              let protection
              try {
                const response = await github.rest.repos.getBranchProtection({
                  owner: repo.owner.login,
                  repo: repo.name,
                  branch: repo.default_branch,
                })
                protection = response.data
                core.info('Branch protection rules fetched')
              } catch (error) {
                if (error.status === 404) {
                  core.info('Skipping: No branch protection rules configured')
                  return
                }
                throw error
              }

              const statusChecks = protection.required_status_checks
              if (!statusChecks?.checks?.length) {
                core.info('Skipping: No required status checks configured')
                return
              }

              core.info('Required status checks found:')
              core.info(JSON.stringify(statusChecks, null, 2))

              core.info('Creating ruleset...')
              const bypassActors = [
                {
                  actor_id: 2637135,
                  actor_type: 'Integration',
                  bypass_mode: 'always',
                },
              ]
              if (repo.owner.type === 'User') {
                bypassActors.push({
                  actor_id: 5,
                  actor_type: 'RepositoryRole',
                  bypass_mode: 'always',
                })
              } else if (repo.owner.type === 'Organization') {
                bypassActors.push({
                  actor_id: null,
                  actor_type: 'OrganizationAdmin',
                  bypass_mode: 'always',
                })
              }
              const ruleset = {
                name: 'default - status checks',
                target: 'branch',
                enforcement: 'active',
                bypass_actors: bypassActors,
                conditions: {
                  ref_name: {
                    include: ['~DEFAULT_BRANCH'],
                    exclude: [],
                  },
                },
                rules: [
                  {
                    type: 'required_status_checks',
                    parameters: {
                      strict_required_status_checks_policy: statusChecks.strict,
                      required_status_checks: statusChecks.checks.map(check => ({
                        context: check.context,
                        integration_id: check.app_id,
                      })),
                    },
                  },
                ],
              }
              core.info(JSON.stringify(ruleset, null, 2))
              await github.rest.repos.createRepoRuleset({
                owner: repo.owner.login,
                repo: repo.name,
                ...ruleset,
              })
              core.info('Ruleset created')

              core.info('Deleting branch protection rule...')
              await github.rest.repos.deleteBranchProtection({
                owner: repo.owner.login,
                repo: repo.name,
                branch: repo.default_branch,
              })
              core.info('Branch protection rule deleted')

              if (repo.full_name.startsWith('remal-gradle-')) throw new Error('Testing')
            })
          }
