name: Manage notifications

on:
  schedule:
  - cron: '0/15 * * * *'
  push:
    branches:
    - main
    paths:
    - '.github/workflows/manage-notifications.yml'
  workflow_dispatch:
    inputs:
      days_to_look_back:
        description: 'Number of days to look back for notifications'
        required: false
        default: 3
        type: number

concurrency:
  group: manage-notifications
  cancel-in-progress: false

jobs:
  manage-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: Get rate limits
      uses: remal-github-actions/get-rate-limits@v1
      id: rate-limits
      with:
        githubToken: ${{secrets.NOTIFICATIONS_TOKEN}}

    - name: Make rate limits decision
      id: decision
      run: |
        echo "Core rate limit usage: ${{steps.rate-limits.outputs.coreUsage}}"
        if [ "${{steps.rate-limits.outputs.coreUsage < 50}}" == "true" ]; then
          echo "Enough rate limits"
          echo 'enough=true' | tee -a "$GITHUB_OUTPUT"
        else
          echo "::warning::Not enough rate limits!"
          if [ "${{github.event_name != 'schedule'}}" == "true" ]; then
            echo "::warning::Executing anyway, as event is '${{github.event_name}}'"
            echo 'enough=true' | tee -a "$GITHUB_OUTPUT"
          else
            echo 'enough=false' | tee -a "$GITHUB_OUTPUT"
          fi
        fi

    - name: Compute cache key
      if: ${{fromJSON(steps.decision.outputs.enough) == true}}
      id: cache-key
      env:
        GH_TOKEN: ${{github.token}}
        DISMISS_CLOSED_PR_NOTIFICATION_REPOS: ${{vars.DISMISS_CLOSED_PR_NOTIFICATION_REPOS || ''}}
        DISMISS_FAILED_PIPELINE_REPOS: ${{vars.DISMISS_FAILED_PIPELINE_REPOS || ''}}
      run: |
        WORKFLOW_HASH=$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/manage-notifications.yml" --jq '.sha')
        SETTINGS_HASH=$(printf '%s\n----\n%s' "$DISMISS_CLOSED_PR_NOTIFICATION_REPOS" "$DISMISS_FAILED_PIPELINE_REPOS" | sha256sum | cut -c1-16)
        echo "prefix=processed-notifications-${WORKFLOW_HASH}-${SETTINGS_HASH}" | tee -a "$GITHUB_OUTPUT"

    - name: Notifications cache
      if: ${{fromJSON(steps.decision.outputs.enough) == true}}
      uses: actions/cache@v6
      with:
        path: .notifications-cache
        key: ${{steps.cache-key.outputs.prefix}}-${{github.run_id}}
        restore-keys: ${{steps.cache-key.outputs.prefix}}-

    - name: Manage notifications
      if: ${{fromJSON(steps.decision.outputs.enough) == true}}
      uses: actions/github-script@v9
      env:
        DISMISS_CLOSED_PR_NOTIFICATION_REPOS: ${{vars.DISMISS_CLOSED_PR_NOTIFICATION_REPOS || ''}}
        DISMISS_FAILED_PIPELINE_REPOS: ${{vars.DISMISS_FAILED_PIPELINE_REPOS || ''}}
        DAYS_TO_LOOK_BACK: ${{inputs.days_to_look_back || '3'}}
      with:
        github-token: ${{secrets.NOTIFICATIONS_TOKEN}}
        script: |
          const fs = require('fs')
          function loadCache(file) {
            const cache = new Map()
            if (!fs.existsSync(file)) return cache
            for (const line of fs.readFileSync(file, 'utf8').split('\n')) {
              if (!line) continue
              const sep = line.indexOf('\t')
              if (sep < 0) continue
              cache.set(line.substring(0, sep), line.substring(sep + 1))
            }
            return cache
          }
          const processedCacheFile = '.notifications-cache/processed.txt'
          const doneCacheFile = '.notifications-cache/done.txt'
          const processedCache = loadCache(processedCacheFile)
          const doneCache = loadCache(doneCacheFile)
          console.log('Loaded ' + processedCache.size + ' cached processed, ' + doneCache.size + ' cached done')
          const markedDone = new Map()
          async function markThreadAsDone(notification) {
            if (doneCache.get(notification.id) === notification.updated_at) {
              console.log("  Already marked as done (cached), skipping")
              return
            }
            await github.rest.activity.markThreadAsDone({ thread_id: notification.id })
            markedDone.set(notification.id, notification.updated_at)
          }

          // excluded from processed cache so they are re-evaluated on every run
          const reprocessIds = new Set()

          const authenticatedUser = await github.rest.users.getAuthenticated().then(it => it.data)

          const dismissFailedPipelineRepos = (process.env.DISMISS_FAILED_PIPELINE_REPOS ?? '')
            .split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)

          const dismissClosedPrRepos = (process.env.DISMISS_CLOSED_PR_NOTIFICATION_REPOS ?? '')
            .split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)

          const nowMillis = new Date().getTime()
          const lookbackDaysRaw = Number(process.env.DAYS_TO_LOOK_BACK)
          const lookbackDays = Number.isFinite(lookbackDaysRaw) && lookbackDaysRaw > 0 ? lookbackDaysRaw : 3
          console.log('Looking back ' + lookbackDays + ' day(s)')
          const sinceMillis = nowMillis - (lookbackDays * 24 * 3600 * 1000)
          const allFetchedNotifications = await github.paginate(github.rest.activity.listNotificationsForAuthenticatedUser, {
            all: true, // includes both read and done notifications, not just unread
            since: new Date(sinceMillis).toISOString(),
          })
          for (const notification of allFetchedNotifications) {
            const notificationToLog = { ...notification }
            if (notificationToLog.repository) {
              notificationToLog.repository = {
                full_name: notification.repository.full_name,
                html_url: notification.repository.html_url,
              }
            }
            //console.log(JSON.stringify(notificationToLog, null, 2))
          }
          const notifications = allFetchedNotifications.filter(n => processedCache.get(n.id) !== n.updated_at)
          console.log('Total fetched: ' + allFetchedNotifications.length + ', after cache filter: ' + notifications.length)

          const checkSuiteNotifications = notifications.filter(n => n.subject?.type === 'CheckSuite')
          const remainingCheckSuiteNotifications = []
          for (const notification of checkSuiteNotifications) {
            const title = notification.subject?.title ?? ''

            let notificationDeletionReason = null
            if (title.match(/ workflow run(, Attempt #\d+)? cancelled for .* branch$/)) {
              notificationDeletionReason = 'cancelled'
            } else if (notification.repository != null && dismissFailedPipelineRepos.some(entry => entry === notification.repository.full_name || entry === notification.repository.owner.login)) {
              notificationDeletionReason = 'repo matches DISMISS_FAILED_PIPELINE_REPOS'
            }

            if (notificationDeletionReason != null) {
              console.log("CheckSuite " + (notification.repository?.full_name ?? '') + " '" + title + "' (" + notification.id + ")")
              console.log("  Marking thread as done, reason: " + notificationDeletionReason)
              await markThreadAsDone(notification)
            } else {
              remainingCheckSuiteNotifications.push(notification)
            }
          }

          // Remaining CheckSuite notifications should not be cached, so they are re-evaluated on every run
          remainingCheckSuiteNotifications.forEach(n => reprocessIds.add(n.id))

          const checkSuiteTitlePattern = /^(.+) workflow run(?:, Attempt #\d+)? \w+ for (.+) branch$/
          const checkSuiteGroups = new Map()
          for (const notification of remainingCheckSuiteNotifications) {
            const title = notification.subject?.title ?? ''
            const match = title.match(checkSuiteTitlePattern)
            if (!match) continue
            const key = (notification.repository?.full_name ?? '') + '|' + match[1] + '|' + match[2]
            if (!checkSuiteGroups.has(key)) checkSuiteGroups.set(key, [])
            checkSuiteGroups.get(key).push(notification)
          }
          for (const [key, group] of checkSuiteGroups) {
            group.sort((a, b) => new Date(b.updated_at).getTime() - new Date(a.updated_at).getTime())
            const newestNotification = group[0]
            console.log("CheckSuite " + (newestNotification.repository?.full_name ?? '') + " '" + (newestNotification.subject?.title ?? '') + "' (" + newestNotification.id + ")")
            console.log("  Leaving newest CheckSuite notification")
            for (let i = 1; i < group.length; i++) {
              const notification = group[i]
              console.log("CheckSuite " + (notification.repository?.full_name ?? '') + " '" + (notification.subject?.title ?? '') + "' (" + notification.id + ")")
              console.log("  Marking thread as done, reason: duplicate (keeping newer notification " + group[0].id + ")")
              await markThreadAsDone(notification)
            }
          }

          for (const notification of notifications) {
            if (notification.subject?.type !== 'PullRequest') continue
            if (notification.repository == null) continue

            const repositoryUrl = notification.repository.url
            let pullRequestId = notification.subject.url
            if (pullRequestId.startsWith(repositoryUrl)) {
              pullRequestId = pullRequestId.substring(repositoryUrl.length)
            }
            if (pullRequestId.startsWith('/pulls/')) {
              pullRequestId = pullRequestId.substring('/pulls/'.length)
            }

            const pullRequest = await github.rest.pulls.get({
              owner: notification.repository.owner.login,
              repo: notification.repository.name,
              pull_number: pullRequestId,
            }).then(it => it.data)
            console.log("PullRequest " + notification.repository.full_name + "#" + pullRequestId + " '" + notification.subject.title + "' (" + notification.id + ")")

            if (notification.reason === 'review_requested') {
              const isReviewer = pullRequest.requested_reviewers.some(
                reviewer => reviewer.login === authenticatedUser.login
              )
              if (!isReviewer) {
                console.log("  Not in reviewers list, marking thread as done")
                await markThreadAsDone(notification)
                continue
              }
            }

            let processingReason = null
            if (pullRequest.user.login.endsWith('[bot]')) {
              processingReason = 'bot PR'
            } else if (pullRequest.labels.some(label => label.name === 'sync-with-template')) {
              processingReason = 'sync-with-template label'
            } else if (dismissClosedPrRepos.some(entry => entry === notification.repository.full_name || entry === notification.repository.owner.login)) {
              processingReason = 'repo matches DISMISS_CLOSED_PR_NOTIFICATION_REPOS'
            }

            if (processingReason == null) {
              console.log("  Notification is not eligible for auto-dismissal")
            } else if (pullRequest.merged_at != null) {
              console.log("  Marking thread as done, reason: " + processingReason + ", merged")
              await markThreadAsDone(notification)
            } else if (pullRequest.closed_at != null) {
              console.log("  Marking thread as done, reason: " + processingReason + ", closed")
              await markThreadAsDone(notification)
            } else {
              console.log("  PR may require attention (" + processingReason + ")")
            }
          }

          // Deployment approval requests (WorkflowRun / approval_requested).
          // Mirrors the PR review_requested rule: dismiss when you are not asked personally.
          // The notification has no link to the run, so we check per repo: if you are a personal
          // (type 'User') reviewer on any still-waiting deployment, keep it and re-check next run;
          // otherwise (team-only pending, or already resolved with no waiting run) mark it done.
          const deployNotifications = notifications.filter(
            n => n.subject?.type === 'WorkflowRun' && n.reason === 'approval_requested' && n.repository != null
          )
          const deployNotificationsByRepo = new Map()
          for (const notification of deployNotifications) {
            const key = notification.repository.full_name
            if (!deployNotificationsByRepo.has(key)) deployNotificationsByRepo.set(key, [])
            deployNotificationsByRepo.get(key).push(notification)
          }
          for (const [repoFullName, group] of deployNotificationsByRepo) {
            const owner = group[0].repository.owner.login
            const repo = group[0].repository.name

            let personalPending = false
            let lookupFailed = false
            try {
              const waitingRunsResponse = await github.request('GET /repos/{owner}/{repo}/actions/runs', {
                owner,
                repo,
                status: 'waiting',
                per_page: 100,
              })
              const waitingRuns = waitingRunsResponse.data.workflow_runs ?? []
              if (waitingRuns.length >= 100) {
                console.log("Deployment approval " + repoFullName + ": 100+ waiting runs, inspecting first 100 only")
              }
              for (const run of waitingRuns) {
                const pendingDeployments = await github.request(
                  'GET /repos/{owner}/{repo}/actions/runs/{run_id}/pending_deployments',
                  { owner, repo, run_id: run.id },
                ).then(response => response.data)
                for (const pendingDeployment of pendingDeployments) {
                  for (const reviewer of (pendingDeployment.reviewers ?? [])) {
                    if (reviewer.type === 'User' && reviewer.reviewer?.login === authenticatedUser.login) {
                      personalPending = true
                    }
                  }
                }
                if (personalPending) break
              }
            } catch (error) {
              console.log("Deployment approval " + repoFullName + ": failed to inspect pending deployments (" + error.message + ")")
              lookupFailed = true
            }

            for (const notification of group) {
              console.log("WorkflowRun " + repoFullName + " '" + (notification.subject?.title ?? '') + "' (" + notification.id + ")")
              if (lookupFailed) {
                console.log("  Leaving notification, could not inspect pending deployments")
                reprocessIds.add(notification.id)
              } else if (personalPending) {
                console.log("  You are a personal reviewer on a waiting deployment, leaving notification")
                reprocessIds.add(notification.id)
              } else {
                console.log("  Not asked personally (team-only or resolved), marking thread as done")
                await markThreadAsDone(notification)
              }
            }
          }

          fs.mkdirSync('.notifications-cache', { recursive: true })
          const cacheLines = []
          for (const n of allFetchedNotifications) {
            if (reprocessIds.has(n.id)) continue
            cacheLines.push(n.id + '\t' + n.updated_at)
          }
          fs.writeFileSync(processedCacheFile, cacheLines.join('\n'))
          console.log('Wrote ' + cacheLines.length + ' notifications to processed cache')

          for (const [id, updatedAt] of markedDone) {
            doneCache.set(id, updatedAt)
          }
          const fetchedIds = new Set(allFetchedNotifications.map(n => n.id))
          const doneLines = []
          for (const [id, updatedAt] of doneCache) {
            if (!fetchedIds.has(id)) continue
            doneLines.push(id + '\t' + updatedAt)
          }
          fs.writeFileSync(doneCacheFile, doneLines.join('\n'))
          console.log('Wrote ' + doneLines.length + ' notifications to done cache')

