name: Manage notifications

on:
  schedule:
  - cron: '0/15 * * * *'
  push:
    branches:
    - main
    paths:
    - '.github/workflows/manage-notifications.yml'
  workflow_dispatch: { }

concurrency:
  group: manage-notifications
  cancel-in-progress: true

jobs:
  manage-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Get rate limits
      uses: remal-github-actions/get-rate-limits@v1
      id: rate-limits
      with:
        githubToken: ${{secrets.NOTIFICATIONS_TOKEN || vars.NOTIFICATIONS_TOKEN || github.token}}
    - name: Make rate limits decision
      id: decision
      run: |
        echo "Core rate limit usage: ${{steps.rate-limits.outputs.coreUsage}}"
        if [ "${{steps.rate-limits.outputs.coreUsage < 50}}" == "true" ]; then
          echo "Enough rate limits"
          echo 'enough=true' >> $GITHUB_OUTPUT
        else
          echo "::warning::Not enough rate limits!"
          if [ "${{github.event_name != 'schedule'}}" == "true" ]; then
            echo "::warning::Executing anyway, as event is '${{github.event_name}}'"
            echo 'enough=true' >> $GITHUB_OUTPUT
          else
            echo 'enough=false' >> $GITHUB_OUTPUT
          fi
        fi

    - name: Manage notifications
      if: ${{fromJSON(steps.decision.outputs.enough) == true}}
      uses: actions/github-script@v9
      env:
        DISMISS_CLOSED_PR_NOTIFICATION_REPOS: ${{vars.DISMISS_CLOSED_PR_NOTIFICATION_REPOS || ''}}
        DISMISS_FAILED_PIPELINE_REPOS: ${{vars.DISMISS_FAILED_PIPELINE_REPOS || ''}}
      with:
        github-token: ${{ secrets.NOTIFICATIONS_TOKEN }}
        script: |
          const authenticatedUser = await github.rest.users.getAuthenticated().then(it => it.data)

          const dismissFailedPipelineRepos = (process.env.DISMISS_FAILED_PIPELINE_REPOS ?? '')
            .split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)

          const dismissClosedPrRepos = (process.env.DISMISS_CLOSED_PR_NOTIFICATION_REPOS ?? '')
            .split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0)

          const nowMillis = new Date().getTime()
          const sinceMillis = nowMillis - (3 * 24 * 3600 * 1000)
          const notifications = await github.paginate(github.rest.activity.listNotificationsForAuthenticatedUser, {
            //all: true,
            since: new Date(sinceMillis).toISOString(),
          })
          for (const notification of notifications) {
            const notificationToLog = { ...notification }
            if (notificationToLog.repository) {
              notificationToLog.repository = {
                full_name: notification.repository.full_name,
                html_url: notification.repository.html_url,
              }
            }
            //console.log(JSON.stringify(notificationToLog, null, 2))
          }

          const checkSuiteNotifications = notifications.filter(n => n.subject?.type === 'CheckSuite')
          const dismissedCheckSuiteIds = new Set()

          for (const notification of checkSuiteNotifications) {
            const title = notification.subject?.title ?? ''

            let notificationDeletionReason = null
            if (title.match(/ workflow run(, Attempt #\d+)? cancelled for .* branch$/)) {
              notificationDeletionReason = 'cancelled'
            } else if (notification.repository != null && dismissFailedPipelineRepos.some(entry => entry === notification.repository.full_name || entry === notification.repository.owner.login)) {
              notificationDeletionReason = 'repo matches DISMISS_FAILED_PIPELINE_REPOS'
            }

            if (notificationDeletionReason != null) {
              dismissedCheckSuiteIds.add(notification.id)
              console.log("::group::" + title)
              console.log("Marking thread as done, reason: " + notificationDeletionReason)
              await github.rest.activity.markThreadAsDone({
                thread_id: notification.id,
              })
              console.log("::endgroup::")
            }
          }

          const checkSuiteTitlePattern = /^(.+) workflow run(?:, Attempt #\d+)? \w+ for (.+) branch$/
          const checkSuiteGroups = new Map()
          for (const notification of checkSuiteNotifications) {
            if (dismissedCheckSuiteIds.has(notification.id)) continue
            const title = notification.subject?.title ?? ''
            const match = title.match(checkSuiteTitlePattern)
            if (!match) continue
            const key = (notification.repository?.full_name ?? '') + '|' + match[1] + '|' + match[2]
            if (!checkSuiteGroups.has(key)) checkSuiteGroups.set(key, [])
            checkSuiteGroups.get(key).push(notification)
          }
          for (const [key, group] of checkSuiteGroups) {
            if (group.length <= 1) continue
            group.sort((a, b) => new Date(b.updated_at).getTime() - new Date(a.updated_at).getTime())
            for (let i = 1; i < group.length; i++) {
              const notification = group[i]
              console.log("::group::" + notification.subject?.title)
              console.log("Marking thread as done, reason: duplicate (keeping newer notification " + group[0].id + ")")
              await github.rest.activity.markThreadAsDone({
                thread_id: notification.id,
              })
              console.log("::endgroup::")
            }
          }

          for (const notification of notifications) {
            if (notification.subject?.type !== 'PullRequest') continue
            if (notification.repository == null) continue

            const repositoryUrl = notification.repository.url
            let pullRequestId = notification.subject.url
            if (pullRequestId.startsWith(repositoryUrl)) {
              pullRequestId = pullRequestId.substring(repositoryUrl.length)
            }
            if (pullRequestId.startsWith('/pulls/')) {
              pullRequestId = pullRequestId.substring('/pulls/'.length)
            }

            const pullRequest = await github.rest.pulls.get({
              owner: notification.repository.owner.login,
              repo: notification.repository.name,
              pull_number: pullRequestId,
            }).then(it => it.data)
            console.log("::group::Pull Request " + notification.repository.full_name + "#" + pullRequestId + " '" + notification.subject.title + "' (" + notification.id + ")")

            if (notification.reason === 'review_requested') {
              const isReviewer = pullRequest.requested_reviewers.some(
                reviewer => reviewer.login === authenticatedUser.login
              )
              if (!isReviewer) {
                console.log("Not in reviewers list, marking thread as done")
                await github.rest.activity.markThreadAsDone({
                  thread_id: notification.id,
                })
                console.log("::endgroup::")
                continue
              }
            }

            let processingReason = null
            if (pullRequest.user.login.endsWith('[bot]')) {
              processingReason = 'bot PR'
            } else if (pullRequest.labels.some(label => label.name === 'sync-with-template')) {
              processingReason = 'sync-with-template label'
            } else if (dismissClosedPrRepos.some(entry => entry === notification.repository.full_name || entry === notification.repository.owner.login)) {
              processingReason = 'repo matches DISMISS_CLOSED_PR_NOTIFICATION_REPOS'
            }

            if (processingReason == null) {
              console.log("Notification is not eligible for auto-dismissal")
            } else if (pullRequest.merged_at != null) {
              console.log("Marking thread as done, reason: " + processingReason + ", merged")
              await github.rest.activity.markThreadAsDone({
                thread_id: notification.id,
              })
            } else if (pullRequest.closed_at != null) {
              console.log("Marking thread as done, reason: " + processingReason + ", closed")
              await github.rest.activity.markThreadAsDone({
                thread_id: notification.id,
              })
            } else {
              console.log("PR may require attention (" + processingReason + ")")
            }
            console.log("::endgroup::")
          }
